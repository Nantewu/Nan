<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>指挥部后台</title>
    <style>
        body { background: #2c3e50; color: #ecf0f1; font-family: 'Microsoft YaHei'; padding: 40px; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .stat-card { background: #34495e; padding: 30px; border-radius: 8px; border-left: 5px solid #00b38a; }
        h2 { color: #00b38a; }
    </style>
</head>
<body>
    <h1>🚀 指挥部后台管理系统</h1>
    <p>当前身份：高级管理员</p>
    <div class="dashboard">
        <div class="stat-card"><h3>题库数量</h3><p>1,250 道</p></div>
        <div class="stat-card"><h3>活跃特工</h3><p>89 人</p></div>
        <div class="stat-card"><h3>待审评论</h3><p>12 条</p></div>
    </div>
</body>
</html>
