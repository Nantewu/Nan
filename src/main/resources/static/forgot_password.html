<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>找回密码 - 考公智能学习系统</title>
    <style>
        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background-color: #00b38a; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .login-wrapper {
            background: white; border-radius: 10px; box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            display: flex; width: 800px; height: 480px; overflow: hidden;
        }
        .left-illustration {
            width: 50%; background: #f4f7f6; display: flex; justify-content: center; align-items: center;
            background-image: url('https://api.dicebear.com/7.x/micah/svg?seed=security&backgroundColor=f4f7f6');
            background-size: 80%; background-repeat: no-repeat; background-position: center;
        }
        .right-form {
            width: 50%; padding: 40px 50px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center;
        }
        .right-form h2 { color: #333; margin-bottom: 20px; text-align: center; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #00b38a; }
        button {
            width: 100%; padding: 12px; background-color: #00b38a; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background-color: #009673; }
        .back-link { text-align: center; margin-top: 15px; font-size: 14px; }
        .back-link a { color: #00b38a; text-decoration: none; cursor: pointer; }
        .back-link a:hover { text-decoration: underline; }
        #message { margin-top: 15px; font-size: 14px; text-align: center; min-height: 20px; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="left-illustration"></div>
        <div class="right-form">
            <h2>找回密码 (身份核实)</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="请输入你要找回的账号">
            </div>
            <div class="input-group">
                <input type="text" id="nickname" placeholder="请输入你的特工代号(昵称)">
            </div>
            <div class="input-group">
                <input type="password" id="newPassword" placeholder="请输入新密码">
            </div>
            <button onclick="doReset()">重置密码</button>
            
            <div class="back-link">
                <a href="/login.html">想起来了？返回登录</a>
            </div>
            <div id="message"></div>
        </div>
    </div>

    <script>
        function doReset() {
            const user = document.getElementById('username').value;
            const nick = document.getElementById('nickname').value;
            const newPass = document.getElementById('newPassword').value;
            const msgDiv = document.getElementById('message');

            if (!user || !nick || !newPass) {
                msgDiv.style.color = "#e74c3c";
                msgDiv.innerText = "请填写完整所有信息！";
                return;
            }

            // 发送POST请求到后端
            fetch(`/api/user/resetPassword?username=${user}&nickname=${nick}&newPassword=${newPass}`, {
                method: 'POST'
            })
            .then(response => response.text())
            .then(data => {
                if (data.startsWith("成功")) {
                    msgDiv.style.color = "#00b38a";
                    msgDiv.innerText = data.split("|")[1]; // 显示成功信息
                    setTimeout(() => { window.location.href = "/login.html"; }, 2000);
                } else {
                    msgDiv.style.color = "#e74c3c";
                    msgDiv.innerText = data.split("|")[1]; // 显示失败信息
                }
            })
            .catch(err => {
                msgDiv.style.color = "#e74c3c";
                msgDiv.innerText = "连接服务器失败";
            });
        }
    </script>
</body>
</html>
