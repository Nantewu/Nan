<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>账号注册</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #00b38a; /* 保持你的绿色背景 */
            font-family: "Microsoft YaHei", sans-serif;
        }
        .register-container {
            background: white;
            width: 700px;
            display: flex;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .left-panel {
            flex: 1;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .right-panel {
            flex: 1;
            padding: 40px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00b38a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .footer-links {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }
        #message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="left-panel">
        <img src="https://img.icons8.com/bubbles/200/000000/user-male.png" alt="Illustration">
    </div>
    <div class="right-panel">
        <h2>账号注册</h2>
        
        <div class="input-group">
            <input type="text" id="reg-username" placeholder="设置账号 (如: test_user)">
        </div>
        
        <div class="input-group">
            <input type="password" id="reg-password" placeholder="设置密码">
        </div>

        <button onclick="doRegister()">立即注册</button>
        
        <div id="message"></div>

        <div class="footer-links">
            已有账号？<a href="login.html" style="color: #00b38a; text-decoration: none;">返回登录</a>
        </div>
    </div>
</div>

<script>
    function doRegister() {
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;
        const msgDiv = document.getElementById('message');

        if (!username || !password) {
            msgDiv.innerText = "请填写完整的账号和密码！";
            msgDiv.style.color = "red";
            return;
        }

        // 构造发送给后端的数据对象
        const userObj = {
            username: username,
            password: password
        };

        fetch('/api/user/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(userObj)
        })
        .then(res => res.text())
        .then(data => {
            if (data.includes("成功")) {
                msgDiv.style.color = "green";
                msgDiv.innerText = "注册成功！即将跳转登录页...";
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = data;
            }
        })
        .catch(err => {
            msgDiv.innerText = "服务器连接失败，请检查后端服务！";
        });
    }
</script>

</body>
</html>
