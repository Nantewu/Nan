<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自适应学习路径</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 5px;
        }
        .controls input, .controls select, .controls button {
            margin: 5px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .controls button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .controls button:hover {
            background-color: #45a049;
        }
        #pathContainer {
            margin-top: 20px;
        }
        #pathGraph {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        #pathInfo {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        .info-item {
            margin: 10px 0;
        }
        .info-item label {
            font-weight: bold;
            margin-right: 10px;
        }
        .node-details {
            position: absolute;
            background-color: white;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: none;
            z-index: 1000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div class="container">
        <h1>自适应学习路径</h1>
        
        <div class="controls">
            <label for="userId">用户ID:</label>
            <input type="number" id="userId" value="1">
            
            <label for="startKpId">起始知识点ID:</label>
            <input type="text" id="startKpId" value="kp1">
            
            <label for="endKpId">目标知识点ID:</label>
            <input type="text" id="endKpId" value="kp5">
            
            <label for="targetExam">目标考试:</label>
            <select id="targetExam">
                <option value="国考">国考</option>
                <option value="省考">省考</option>
                <option value="选调生">选调生</option>
            </select>
            
            <button onclick="generatePath()">生成路径</button>
            <button onclick="updatePath()">更新路径</button>
        </div>
        
        <div id="pathContainer">
            <h2>学习路径可视化</h2>
            <div id="pathGraph"></div>
        </div>
        
        <div id="pathInfo">
            <h2>路径信息</h2>
            <div class="info-item"><label>路径名称:</label><span id="pathName">-</span></div>
            <div class="info-item"><label>预计时长:</label><span id="estimatedDuration">-</span> 分钟</div>
            <div class="info-item"><label>难度等级:</label><span id="difficultyLevel">-</span></div>
            <div class="info-item"><label>优化策略:</label><span id="optimizationStrategy">-</span></div>
            <div class="info-item"><label>当前进度:</label><span id="progress">-</span>%</div>
        </div>
        
        <div class="node-details" id="nodeDetails"></div>
    </div>
    
    <script>
        let pathId = null;
        let network = null;
        
        // 生成学习路径
        function generatePath() {
            const userId = document.getElementById('userId').value;
            const startKpId = document.getElementById('startKpId').value;
            const endKpId = document.getElementById('endKpId').value;
            const targetExam = document.getElementById('targetExam').value;
            
            fetch('/api/learning-path/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userId: userId,
                    startKpId: startKpId,
                    endKpId: endKpId,
                    targetExam: targetExam
                })
            })
            .then(response => response.json())
            .then(data => {
                pathId = data.id;
                displayPathInfo(data);
                renderPathGraph(data);
            })
            .catch(error => console.error('Error:', error));
        }
        
        // 更新学习路径
        function updatePath() {
            if (!pathId) {
                alert('请先生成学习路径');
                return;
            }
            
            const userId = document.getElementById('userId').value;
            
            fetch(`/api/learning-path/update/${pathId}?userId=${userId}`, {
                method: 'PUT'
            })
            .then(response => response.json())
            .then(data => {
                displayPathInfo(data);
                renderPathGraph(data);
            })
            .catch(error => console.error('Error:', error));
        }
        
        // 显示路径信息
        function displayPathInfo(path) {
            document.getElementById('pathName').textContent = path.pathName;
            document.getElementById('estimatedDuration').textContent = path.estimatedDuration;
            document.getElementById('difficultyLevel').textContent = path.difficultyLevel.toFixed(2);
            document.getElementById('optimizationStrategy').textContent = path.optimizationStrategy;
            document.getElementById('progress').textContent = path.progress;
        }
        
        // 渲染路径图
        function renderPathGraph(path) {
            // 解析路径详情
            let pathDetails;
            try {
                // 尝试解析JSON字符串
                pathDetails = JSON.parse(path.pathDetails);
            } catch (e) {
                // 如果解析失败，使用模拟数据
                pathDetails = {
                    nodes: [
                        {kpId: 'kp1', name: '基础概念', module: '数量关系', difficulty: 0.3, suggestedTime: 30},
                        {kpId: 'kp2', name: '比例运算', module: '数量关系', difficulty: 0.5, suggestedTime: 40},
                        {kpId: 'kp3', name: '行程问题', module: '数量关系', difficulty: 0.7, suggestedTime: 50},
                        {kpId: 'kp4', name: '工程问题', module: '数量关系', difficulty: 0.6, suggestedTime: 45},
                        {kpId: 'kp5', name: '综合应用', module: '数量关系', difficulty: 0.8, suggestedTime: 60}
                    ]
                };
            }
            
            // 准备节点和边数据
            const nodes = [];
            const edges = [];
            
            // 添加节点
            pathDetails.nodes.forEach((node, index) => {
                nodes.push({
                    id: node.kpId,
                    label: node.name,
                    title: `模块: ${node.module}<br>难度: ${node.difficulty}<br>建议时长: ${node.suggestedTime}分钟`,
                    group: node.module,
                    value: node.difficulty * 100
                });
                
                // 添加边（连接到下一个节点）
                if (index < pathDetails.nodes.length - 1) {
                    edges.push({
                        from: node.kpId,
                        to: pathDetails.nodes[index + 1].kpId,
                        label: '→',
                        arrows: 'to'
                    });
                }
            });
            
            // 配置网络
            const container = document.getElementById('pathGraph');
            const data = {
                nodes: nodes,
                edges: edges
            };
            const options = {
                nodes: {
                    shape: 'box',
                    size: 25,
                    font: {
                        size: 14
                    },
                    color: {
                        background: '#ffffff',
                        border: '#4CAF50',
                        highlight: {
                            background: '#4CAF50',
                            border: '#ffffff'
                        }
                    }
                },
                edges: {
                    width: 2,
                    color: {
                        color: '#888888',
                        highlight: '#4CAF50'
                    }
                },
                layout: {
                    hierarchical: {
                        direction: 'LR',
                        sortMethod: 'directed'
                    }
                },
                interaction: {
                    dragNodes: true,
                    zoomView: true,
                    panView: true
                },
                physics: {
                    enabled: true,
                    stabilization: {
                        enabled: true,
                        iterations: 100
                    }
                }
            };
            
            // 创建网络
            if (network) {
                network.destroy();
            }
            network = new vis.Network(container, data, options);
            
            // 节点点击事件
            network.on('click', function(params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    const node = nodes.find(n => n.id === nodeId);
                    if (node) {
                        showNodeDetails(node, params.pointer.DOM);
                    }
                }
            });
        }
        
        // 显示节点详情
        function showNodeDetails(node, position) {
            const details = document.getElementById('nodeDetails');
            details.innerHTML = `
                <h4>${node.label}</h4>
                <p>模块: ${node.title.split('<br>')[0].split(': ')[1]}</p>
                <p>难度: ${node.title.split('<br>')[1].split(': ')[1]}</p>
                <p>建议时长: ${node.title.split('<br>')[2].split(': ')[1]}</p>
            `;
            details.style.left = position.x + 10 + 'px';
            details.style.top = position.y + 10 + 'px';
            details.style.display = 'block';
            
            // 点击其他地方关闭详情
            setTimeout(() => {
                document.addEventListener('click', function closeDetails(e) {
                    if (!details.contains(e.target)) {
                        details.style.display = 'none';
                        document.removeEventListener('click', closeDetails);
                    }
                });
            }, 100);
        }
        
        // 初始化页面
        window.onload = function() {
            // 默认生成一个学习路径
            generatePath();
        };
    </script>
</body>
</html>
