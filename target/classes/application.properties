# 服务器端口配置
server.port=8080

# =============================================================
# Neo4j 图数据库配置 (用于知识图谱)
# =============================================================
# 建议使用 bolt 协议，兼容性更强
spring.neo4j.uri=bolt://localhost:7687 
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=12345678 
# 【关键修复】必须指定连接 hf 数据库，否则默认连 neo4j 数据库导致数据为空
spring.data.neo4j.database=hf

# =============================================================
# MySQL 数据库配置
# =============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/exam_system?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================
# MyBatis-Plus 配置
# =============================================================
mybatis-plus.mapper-locations=classpath:mapper/*.xml
# 注意：根据你之前的截图，你的实体类在 com.example.examsystem 下，没有 entity 子包
mybatis-plus.type-aliases-package=com.example.examsystem
mybatis-plus.configuration.map-underscore-to-camel-case=true

# 打印 SQL 日志，方便调试（建议开启）
logging.level.org.springframework.data.neo4j=DEBUG

